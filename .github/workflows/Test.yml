name: Test

on:
  push:
    branches:
      - main
    tags: ["*"]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/ReusableTest.yml
    with:
      os: ${{ matrix.os }}
      version: ${{ matrix.version }}
      arch: ${{ matrix.arch }}
      allow_failure: ${{ matrix.allow_failure }}
      run_codecov: ${{ matrix.version == '1' && matrix.os == 'ubuntu-latest' }}
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - "lts"
          - "1"
        os:
          - ubuntu-latest
        arch:
          - x64
        allow_failure: [false]

  jet:
    name: Julia 1.12 - JET
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - name: Use Julia cache
        uses: julia-actions/cache@v2
      - name: Instantiate JET test environment
        run: julia --project=test/jet --color=yes -e 'import Pkg; Pkg.resolve(); Pkg.instantiate()'
      - name: Run JET
        run: julia --project=test/jet --color=yes test/jet/runtests.jl
