name: Test on PRs

on:
  pull_request:
    branches:
      - main
    paths:
      - "ext/**"
      - "src/**"
      - "test/**"
      - "*.toml"
      - ".github/workflows/Test.yml"
      - ".github/workflows/TestOnPRs.yml"
    types: [opened, synchronize, reopened]

concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  test:
    uses: ./.github/workflows/ReusableTest.yml
    with:
      os: ubuntu-latest
      version: "1"
      arch: x64
      allow_failure: false
      run_codecov: true
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}

  jet:
    name: Julia 1.12 - JET
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"
      - name: Ensure General registry
        run: |
          julia --color=yes -e 'import Pkg; isempty(Pkg.Registry.reachable_registries()) && Pkg.Registry.add(Pkg.RegistrySpec(name="General"))'
      - name: Use Julia cache
        uses: julia-actions/cache@v2
      - name: Instantiate JET test environment
        run: julia --project=test/jet --color=yes -e 'import Pkg; Pkg.resolve(); Pkg.instantiate()'
      - name: Run JET
        run: julia --project=test/jet --color=yes test/jet/runtests.jl
